name: Build CPython Windows Binaries

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'CPython 源码链接 (.tar.xz 或 .tgz)'
        required: true
        type: string
        default: 'https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz'

jobs:
  build:
    name: Build ${{ matrix.arch }}
    # 【修改 1】：从 windows-latest 降级并固定为 windows-2022，确保稳定的 VS 2022 环境
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [Win32, x64, ARM64]

    steps:
      - name: 解析 URL 及环境变量
        id: vars
        shell: bash
        run: |
          URL="${{ github.event.inputs.source_url }}"
          FILENAME=$(basename "$URL")
          VERSION=$(echo "$FILENAME" | sed -E 's/^Python-(.+)\.(tar\.xz|tgz)$/\1/')
          
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if [[ "${{ matrix.arch }}" == "Win32" ]]; then
            echo "out_name=python-${VERSION}.exe" >> $GITHUB_OUTPUT
            echo "build_dir=win32" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.arch }}" == "x64" ]]; then
            echo "out_name=python-${VERSION}-amd64.exe" >> $GITHUB_OUTPUT
            echo "build_dir=amd64" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.arch }}" == "ARM64" ]]; then
            echo "out_name=python-${VERSION}-arm64.exe" >> $GITHUB_OUTPUT
            echo "build_dir=arm64" >> $GITHUB_OUTPUT
          fi

      - name: 下载源码与 GPG 签名文件
        shell: bash
        run: |
          URL="${{ github.event.inputs.source_url }}"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          echo "正在下载源码包..."
          curl -f -L -A "$UA" -O "$URL"
          
          echo "正在下载签名文件..."
          curl -f -L -A "$UA" -O "${URL}.asc"
          
          echo "正在下载官方公钥文本 (尝试)..."
          curl -L -A "$UA" -o pubkeys.txt https://www.python.org/static/files/pubkeys.txt || echo "官方公钥包下载失败，启用公钥服务器兜底"

      - name: 验证源码签名
        shell: bash
        run: |
          FILENAME="${{ steps.vars.outputs.filename }}"
          
          if [ -f pubkeys.txt ] && grep -q "BEGIN PGP PUBLIC KEY BLOCK" pubkeys.txt; then
            echo "检测到合法的官方公钥文本，正在导入..."
            gpg --import pubkeys.txt
          else
            echo "未检测到合法的本地公钥文本，将通过签名自动追溯远程公钥..."
          fi
          
          VERIFY_OUTPUT=$(gpg --verify "${FILENAME}.asc" "${FILENAME}" 2>&1 || true)
          echo "$VERIFY_OUTPUT"
          
          KEY_ID=$(echo "$VERIFY_OUTPUT" | grep -E "using .* key" | awk '{print $NF}')
          if [ -z "$KEY_ID" ]; then
            KEY_ID=$(echo "$VERIFY_OUTPUT" | grep -i "key ID" | awk '{print $NF}')
          fi
          
          if [ ! -z "$KEY_ID" ]; then
            echo "成功识别到该版本发布者的 Key ID: $KEY_ID"
            echo "正在从全球公钥服务器拉取密钥..."
            gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys "$KEY_ID"
          fi
          
          echo "进行最终的真实性验证:"
          gpg --verify "${FILENAME}.asc" "${FILENAME}"

      - name: 解压源码
        shell: bash
        run: |
          tar -xf "${{ steps.vars.outputs.filename }}"

      - name: 编译并生成完整安装包
        shell: cmd
        run: |
          cd Python-${{ steps.vars.outputs.version }}\PCbuild
          call get_externals.bat
          :: 1. 编译核心
          call build.bat -p ${{ matrix.arch }} -c Release "/p:PlatformToolset=v143"
          :: 2. 编译安装包生成工具 (这是官方打包的核心)
          call build.bat -p ${{ matrix.arch }} -c Release "/p:PlatformToolset=v143" -t Build -t Rebuild -t build_installer
          
      - name: 提取安装包产物
        shell: bash
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          # 编译完成后，安装包位于 en-us 文件夹下
          BUILD_DIR="Python-${VERSION}/PCbuild/${{ steps.vars.outputs.build_dir }}/en-us"
          
          mkdir output_artifact
          # 拷贝所有生成的 .msi 安装包和 .exe 安装引导程序
          cp ${BUILD_DIR}/*.msi output_artifact/
          cp ${BUILD_DIR}/*.exe output_artifact/ || true

      - name: 上传编译产物
        uses: actions/upload-artifact@v7
        with:
          name: Python-${{ matrix.arch }}-Installer
          path: output_artifact/*
