name: Build CPython Windows Installers

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Python source tarball URL (.tar.xz or .tgz)'
        required: true
        type: string
        default: 'https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz'

jobs:
  build:
    strategy:
      matrix:
        arch: [win32, amd64, arm64]
      fail-fast: false
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install tools
        shell: pwsh
        run: |
          choco install 7zip -y --no-progress

      - name: Download source
        shell: pwsh
        env:
          SOURCE_URL: ${{ inputs.source_url }}
        run: |
          $uri = [System.Uri]$env:SOURCE_URL
          $fileName = $uri.Segments[-1]
          Invoke-WebRequest -Uri $env:SOURCE_URL -OutFile $fileName
          
          # Try to download signatures
          $base = $fileName -replace '\.tar\.(xz|gz)$',''
          foreach ($ext in @('.sigstore', '.sig', '.asc')) {
            $sigUrl = "$env:SOURCE_URL$ext"
            try {
              Invoke-WebRequest -Uri $sigUrl -OutFile "$base$ext" -ErrorAction Stop
              Write-Host "Downloaded signature: $base$ext"
            } catch { }
          }

      - name: Extract source
        shell: pwsh
        run: |
          $tarFiles = Get-ChildItem -Filter "Python*.tar*" 
          $tarFile = $tarFiles[0]
          if ($tarFile.Extension -eq '.xz') {
            7z x $tarFile.Name -so | 7z x -si -ttar -o"Python-src"
          } else {
            7z x $tarFile.Name -so | 7z x -si -ttar -o"Python-src"
          }
          $srcDir = Get-ChildItem -Path "Python-src" -Directory | Select-Object -First 1
          $global:PYTHON_SRC = $srcDir.FullName
          Write-Host "Source at: $global:PYTHON_SRC"

      - name: Verify signature
        shell: pwsh
        run: |
          cd "$env:PYTHON_SRC\.."
          $tarFile = Get-ChildItem -Filter "Python*.tar*" | Select-Object -First 1
          if (Test-Path "$($tarFile.Name).sigstore") {
            Write-Host "Verifying with Sigstore..."
            python -m pip install --quiet sigstore
            $bundle = "$($tarFile.Name).sigstore"
            $cmd = "python -m sigstore verify identity --bundle `"$bundle`" --cert-identity `"pablogsal@python.org`" --cert-oidc-issuer `"https://accounts.google.com`" `"$($tarFile.Name)`""
            Invoke-Expression $cmd
          } else {
            Write-Warning "No .sigstore found. Skipping detailed verification."
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@master
        with:
          arch: ${{ matrix.arch == 'win32' && 'x86' || (matrix.arch == 'amd64' && 'x64' || 'arm64') }}

      - name: Build Python (PCbuild)
        shell: cmd
        working-directory: ${{ env.PYTHON_SRC }}
        run: |
          cd PCbuild
          build.bat -e -p ${{ matrix.arch == 'win32' && 'Win32' || matrix.arch }} -c Release

      - name: Build Installer
        shell: cmd
        working-directory: ${{ env.PYTHON_SRC }}
        run: |
          cd Tools\msi
          build.bat -${{ matrix.arch == 'win32' && 'x86' || matrix.arch }} --doc

      - name: Collect installer
        shell: pwsh
        run: |
          $src = "${{ env.PYTHON_SRC }}"
          $versionMatch = Select-String -Path "$src\Include\patchlevel.h" -Pattern 'PY_VERSION\s+"([^"]+)"'
          $version = $versionMatch.Matches.Groups[1].Value
          
          $suffix = @{
            'win32' = ''
            'amd64' = '-amd64'
            'arm64' = '-arm64'
          }[$env:MATRIX_ARCH]
          
          $installerDir = Join-Path $src "Tools\msi\en-us"
          $installer = Get-ChildItem -Path $installerDir -Filter "python-*.exe" | Select-Object -First 1
          
          if ($installer) {
            $newName = "python-$version$suffix.exe"
            Copy-Item $installer.FullName -Destination $newName -Force
            Write-Host "Installer ready: $newName"
          } else {
            Write-Error "Installer not found!"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-installer-${{ matrix.arch }}
          path: python-*.exe
          if-no-files-found: error
