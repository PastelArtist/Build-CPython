  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-x86, build-x64, build-arm64]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Organize and verify artifacts
        run: |
          mkdir -p release_files
          
          cd release_artifacts
          
          # Count successful builds
          SUCCESS=0
          
          # Copy x86 executable
          if find . -name "python-*-x86*" -o -name "python-*.exe" | grep -v amd64 | grep -v arm64 | head -1 | xargs -I {} cp {} ../release_files/ 2>/dev/null; then
            echo "✓ x86 executable ready"
            ((SUCCESS++))
          fi
          
          # Copy x64 executable
          if find . -name "*amd64.exe" -o -name "*x64*.exe" | head -1 | xargs -I {} cp {} ../release_files/ 2>/dev/null; then
            echo "✓ x64 executable ready"
            ((SUCCESS++))
          fi
          
          # Copy ARM64 executable
          if find . -name "*arm64.exe" | head -1 | xargs -I {} cp {} ../release_files/ 2>/dev/null; then
            echo "✓ ARM64 executable ready"
            ((SUCCESS++))
          fi
          
          cd ../release_files
          echo ""
          echo "=== Build Summary ==="
          echo "Successful builds: $SUCCESS/3"
          echo ""
          echo "=== Release Files ==="
          ls -lh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'EOF'
          # CPython ${{ needs.prepare.outputs.version }} Windows Builds
          
          **Source**: ${{ github.event.inputs.source_url }}
          
          **Build Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          ## Executables
          
          - **python-${{ needs.prepare.outputs.version }}.exe** - x86 (32-bit)
          - **python-${{ needs.prepare.outputs.version }}-amd64.exe** - x64 (64-bit)
          - **python-${{ needs.prepare.outputs.version }}-arm64.exe** - ARM64 (64-bit)
          
          ## Build Information
          
          Built using official CPython Windows build system (PCbuild).
          
          EOF
          cat release_notes.md

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpython-${{ needs.prepare.outputs.version }}-all
          path: release_files/
          retention-days: 90

      - name: Generate summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Source**: ${{ github.event.inputs.source_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "release_files" ]; then
            echo "### Artifacts Generated" >> $GITHUB_STEP_SUMMARY
            ls -1 release_files/ | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          else
            echo "### Build Status" >> $GITHUB_STEP_SUMMARY
            echo "Check job logs for details" >> $GITHUB_STEP_SUMMARY
          fi
