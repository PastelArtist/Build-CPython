name: Build CPython

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'CPython source archive URL (tar.xz or tgz format)'
        required: true
        default: 'https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz'
        type: string
      verify_signature:
        description: 'Verify GPG signature'
        required: true
        default: true
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      archive_name: ${{ steps.extract.outputs.archive_name }}
      archive_type: ${{ steps.extract.outputs.archive_type }}
    steps:
      - name: Extract version and archive info from URL
        id: extract
        run: |
          URL="${{ github.event.inputs.source_url }}"
          ARCHIVE_NAME=$(basename "$URL")
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          
          if [[ "$ARCHIVE_NAME" == *.tar.xz ]]; then
            ARCHIVE_TYPE="tar.xz"
          elif [[ "$ARCHIVE_NAME" == *.tgz ]]; then
            ARCHIVE_TYPE="tgz"
          else
            echo "Error: Unsupported archive format"
            exit 1
          fi
          echo "archive_type=$ARCHIVE_TYPE" >> $GITHUB_OUTPUT
          
          VERSION=$(echo "$ARCHIVE_NAME" | sed -E 's/Python-([0-9]+\.[0-9]+\.[0-9]+)\.(tar\.xz|tgz)/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  download-and-verify:
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - name: Download CPython source
        run: |
          cd /tmp
          wget -q "${{ github.event.inputs.source_url }}"
          echo "Downloaded: $(ls -lh $(basename ${{ github.event.inputs.source_url }}))"

      - name: Download GPG signature
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          BASE_URL="${{ github.event.inputs.source_url }}"
          BASE_URL="${BASE_URL%/*}"
          
          wget -q "$BASE_URL/$ARCHIVE_NAME.asc" || echo "No .asc file found"
          ls -lh $ARCHIVE_NAME* 2>/dev/null

      - name: Import GPG keys
        run: |
          echo "Importing GPG keys..."
          
          gpg --keyserver keys.openpgp.org --recv-keys CFDCA245B1043CF2A5F97865FFE87404168BD847 2>&1 || \
          gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys CFDCA245B1043CF2A5F97865FFE87404168BD847 2>&1 || \
          echo "Primary key not found, trying fallback keys..."
          
          gpg --keyserver keys.openpgp.org --recv-keys \
            0D96DF4D4110E5C1A2A4B132C3A8495E0E31E23B \
            E8AC80D7A454B8403413E8521C4EB3FE58C6E5C6 \
            A821E680E5F81405F7BF06D3FEB907C925FFFC99 2>&1 || true

      - name: Verify GPG signature
        if: github.event.inputs.verify_signature == 'true'
        continue-on-error: true
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          
          if [ -f "$ARCHIVE_NAME.asc" ]; then
            echo "Verifying GPG signature..."
            if gpg --verify "$ARCHIVE_NAME.asc" "$ARCHIVE_NAME" 2>&1; then
              echo "GPG signature verification PASSED"
            else
              echo "GPG signature verification FAILED (but continuing...)"
            fi
          else
            echo "No .asc signature file found"
          fi

      - name: Calculate source hash
        id: hash
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          SHA256=$(sha256sum "$ARCHIVE_NAME" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"

      - name: Upload source archive
        uses: actions/upload-artifact@v7
        with:
          name: cpython-source-archive
          path: /tmp/${{ needs.prepare.outputs.archive_name }}
          retention-days: 1

  build-x86:
    runs-on: windows-2022
    needs: [prepare, download-and-verify]
    steps:
      - name: Download verified source archive
        uses: actions/download-artifact@v4
        with:
          name: cpython-source-archive
          path: ${{ env.TEMP }}

      - name: Verify archive integrity on Windows
        run: |
          $ArchivePath = Join-Path $env:TEMP "${{ needs.prepare.outputs.archive_name }}"
          
          Write-Host "Computing SHA256..."
          $CurrentHash = (Get-FileHash -Path $ArchivePath -Algorithm SHA256).Hash.ToLower()
          $ExpectedHash = "${{ needs.download-and-verify.outputs.sha256 }}".ToLower()
          
          Write-Host "Expected: $ExpectedHash"
          Write-Host "Current:  $CurrentHash"
          
          if ($CurrentHash -eq $ExpectedHash) {
            Write-Host "Archive integrity verified!"
          } else {
            Write-Host "Archive integrity check FAILED!"
            exit 1
          }

      - name: Extract source
        run: |
          $ArchiveName = "${{ needs.prepare.outputs.archive_name }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          if ($ArchiveName -like "*.tar.xz") {
            tar -xf $OutputPath -C $env:TEMP
          } else {
            tar -xzf $OutputPath -C $env:TEMP
          }

      - name: Locate source directory
        id: build
        run: |
          $PythonDirs = @(Get-ChildItem $env:TEMP -Directory -Filter "Python-*" -ErrorAction SilentlyContinue)
          if ($PythonDirs.Count -eq 0) { 
            Write-Host "ERROR: No Python-* directory found"
            exit 1 
          }
          
          $SourceDir = $PythonDirs[0].FullName
          Write-Host "Found source: $SourceDir"
          echo "source_dir=$SourceDir" >> $env:GITHUB_OUTPUT

      - name: Build CPython x86 (Win32)
        run: |
          $SourceDir = "${{ steps.build.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          Write-Host "Building x86 (Win32)..."
          cd $PcbuildDir
          & cmd /c "build.bat -d -p Win32"
          
          if ($LASTEXITCODE -ne 0) { 
            Write-Host "Build failed with exit code: $LASTEXITCODE"
            exit 1 
          }
          Write-Host "Build successful"

      - name: Locate x86 executable
        id: exe
        run: |
          $SourceDir = "${{ steps.build.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          $ExePath = Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ExePath) { 
            Write-Host "ERROR: python.exe not found"
            exit 1 
          }
          
          Write-Host "Found: $($ExePath.FullName)"
          echo "exe_path=$($ExePath.FullName)" >> $env:GITHUB_OUTPUT

      - name: Copy executable
        run: |
          $Version = "${{ needs.prepare.outputs.version }}"
          $ExePath = "${{ steps.exe.outputs.exe_path }}"
          $OutputName = "python-$Version.exe"
          
          Copy-Item $ExePath $OutputName -Force
          Write-Host "Created: $OutputName"
          Get-Item $OutputName | Select-Object Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cpython-x86
          path: python-${{ needs.prepare.outputs.version }}.exe
          retention-days: 30

  build-x64:
    runs-on: windows-2022
    needs: [prepare, download-and-verify]
    steps:
      - name: Download verified source archive
        uses: actions/download-artifact@v4
        with:
          name: cpython-source-archive
          path: ${{ env.TEMP }}

      - name: Verify archive integrity on Windows
        run: |
          $ArchivePath = Join-Path $env:TEMP "${{ needs.prepare.outputs.archive_name }}"
          
          Write-Host "Computing SHA256..."
          $CurrentHash = (Get-FileHash -Path $ArchivePath -Algorithm SHA256).Hash.ToLower()
          $ExpectedHash = "${{ needs.download-and-verify.outputs.sha256 }}".ToLower()
          
          Write-Host "Expected: $ExpectedHash"
          Write-Host "Current:  $CurrentHash"
          
          if ($CurrentHash -eq $ExpectedHash) {
            Write-Host "Archive integrity verified!"
          } else {
            Write-Host "Archive integrity check FAILED!"
            exit 1
          }

      - name: Extract source
        run: |
          $ArchiveName = "${{ needs.prepare.outputs.archive_name }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          if ($ArchiveName -like "*.tar.xz") {
            tar -xf $OutputPath -C $env:TEMP
          } else {
            tar -xzf $OutputPath -C $env:TEMP
          }

      - name: Locate source directory
        id: build
        run: |
          $PythonDirs = @(Get-ChildItem $env:TEMP -Directory -Filter "Python-*" -ErrorAction SilentlyContinue)
          if ($PythonDirs.Count -eq 0) { exit 1 }
          echo "source_dir=$($PythonDirs[0].FullName)" >> $env:GITHUB_OUTPUT

      - name: Build CPython x64
        run: |
          $SourceDir = "${{ steps.build.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          Write-Host "Building x64..."
          cd $PcbuildDir
          & cmd /c "build.bat -d -p x64"
          
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Build successful"

      - name: Locate x64 executable
        id: exe
        run: |
          $SourceDir = "${{ steps.build.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          $ExePath = Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ExePath) { exit 1 }
          
          echo "exe_path=$($ExePath.FullName)" >> $env:GITHUB_OUTPUT

      - name: Copy executable
        run: |
          $Version = "${{ needs.prepare.outputs.version }}"
          Copy-Item "${{ steps.exe.outputs.exe_path }}" "python-$Version-amd64.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cpython-x64
          path: python-${{ needs.prepare.outputs.version }}-amd64.exe
          retention-days: 30

  build-arm64:
    runs-on: windows-2022
    needs: [prepare, download-and-verify]
    steps:
      - name: Download verified source archive
        uses: actions/download-artifact@v4
        with:
          name: cpython-source-archive
          path: ${{ env.TEMP }}

      - name: Verify archive integrity on Windows
        run: |
          $ArchivePath = Join-Path $env:TEMP "${{ needs.prepare.outputs.archive_name }}"
          
          Write-Host "Computing SHA256..."
          $CurrentHash = (Get-FileHash -Path $ArchivePath -Algorithm SHA256).Hash.ToLower()
          $ExpectedHash = "${{ needs.download-and-verify.outputs.sha256 }}".ToLower()
          
          Write-Host "Expected: $ExpectedHash"
          Write-Host "Current:  $CurrentHash"
          
          if ($CurrentHash -eq $ExpectedHash) {
            Write-Host "Archive integrity verified!"
          } else {
            Write-Host "Archive integrity check FAILED!"
            exit 1
          }

      - name: Extract source
        run: |
          $ArchiveName = "${{ needs.prepare.outputs.archive_name }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          if ($ArchiveName -like "*.tar.xz") {
            tar -xf $OutputPath -C $env:TEMP
          } else {
            tar -xzf $OutputPath -C $env:TEMP
          }

      - name: Locate source directory
        id: build
        run: |
          $PythonDirs = @(Get-ChildItem $env:TEMP -Directory -Filter "Python-*" -ErrorAction SilentlyContinue)
          if ($PythonDirs.Count -eq 0) { exit 1 }
          echo "source_dir=$($PythonDirs[0].FullName)" >> $env:GITHUB_OUTPUT

      - name: Build CPython ARM64
        run: |
          $SourceDir = "${{ steps.build.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          Write-Host "Building ARM64..."
          cd $PcbuildDir
          & cmd /c "build.bat -d -p ARM64"
          
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Build successful"

      - name: Locate ARM64 executable
        id: exe
        run: |
          $SourceDir = "${{ steps.build.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          $ExePath = Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ExePath) { exit 1 }
          
          echo "exe_path=$($ExePath.FullName)" >> $env:GITHUB_OUTPUT

      - name: Copy executable
        run: |
          $Version = "${{ needs.prepare.outputs.version }}"
          Copy-Item "${{ steps.exe.outputs.exe_path }}" "python-$Version-arm64.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cpython-arm64
          path: python-${{ needs.prepare.outputs.version }}-arm64.exe
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-x86, build-x64, build-arm64]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release_files
          find release_artifacts -name "*.exe" -exec cp {} release_files/ \;
          
          echo "=== Final Release Files ===" 
          ls -lh release_files/

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cpython-${{ needs.prepare.outputs.version }}-all
          path: release_files/
          retention-days: 90

      - name: Generate summary
        run: |
          echo "## CPython ${{ needs.prepare.outputs.version }} Build Complete ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source**: ${{ github.event.inputs.source_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Executables:" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "release_files" ] && [ -n "$(ls -A release_files/)" ]; then
            ls -1 release_files/ | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          else
            echo "- No artifacts generated" >> $GITHUB_STEP_SUMMARY
          fi
