name: Build CPython

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'CPython source archive URL (tar.xz or tgz format)'
        required: true
        default: 'https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz'
        type: string
      verify_signature:
        description: 'Verify GPG signature'
        required: true
        default: true
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      archive_name: ${{ steps.extract.outputs.archive_name }}
      archive_type: ${{ steps.extract.outputs.archive_type }}
    steps:
      - name: Extract version and archive info from URL
        id: extract
        run: |
          URL="${{ github.event.inputs.source_url }}"
          ARCHIVE_NAME=$(basename "$URL")
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          
          if [[ "$ARCHIVE_NAME" == *.tar.xz ]]; then
            ARCHIVE_TYPE="tar.xz"
          elif [[ "$ARCHIVE_NAME" == *.tgz ]]; then
            ARCHIVE_TYPE="tgz"
          else
            echo "Error: Unsupported archive format"
            exit 1
          fi
          echo "archive_type=$ARCHIVE_TYPE" >> $GITHUB_OUTPUT
          
          VERSION=$(echo "$ARCHIVE_NAME" | sed -E 's/Python-([0-9]+\.[0-9]+\.[0-9]+)\.(tar\.xz|tgz)/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "Archive: $ARCHIVE_NAME"
          echo "Version: $VERSION"

  download-and-verify:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          cd /tmp
          wget -q "${{ github.event.inputs.source_url }}"
          echo "Downloaded: $(ls -lh $(basename ${{ github.event.inputs.source_url }}))"

      - name: Download GPG signature
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          BASE_URL="${{ github.event.inputs.source_url }}"
          BASE_URL="${BASE_URL%/*}"
          
          wget -q "$BASE_URL/$ARCHIVE_NAME.asc" || echo "No .asc file found"
          ls -lh $ARCHIVE_NAME* 2>/dev/null

      - name: Import GPG keys from keyserver
        run: |
          echo "Importing GPG keys..."
          
          gpg --keyserver keys.openpgp.org --recv-keys CFDCA245B1043CF2A5F97865FFE87404168BD847 2>&1 || \
          gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys CFDCA245B1043CF2A5F97865FFE87404168BD847 2>&1 || true
          
          gpg --keyserver keys.openpgp.org --recv-keys \
            0D96DF4D4110E5C1A2A4B132C3A8495E0E31E23B \
            E8AC80D7A454B8403413E8521C4EB3FE58C6E5C6 \
            A821E680E5F81405F7BF06D3FEB907C925FFFC99 2>&1 || true

      - name: Verify GPG signature
        if: github.event.inputs.verify_signature == 'true'
        continue-on-error: true
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          
          if [ -f "$ARCHIVE_NAME.asc" ]; then
            echo "Verifying signature..."
            gpg --verify "$ARCHIVE_NAME.asc" "$ARCHIVE_NAME" || true
          fi

      - name: Calculate source hash
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          sha256sum "$ARCHIVE_NAME"

  build-x86:
    runs-on: windows-2022
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          $SourceUrl = "${{ github.event.inputs.source_url }}"
          $ArchiveName = Split-Path -Leaf $SourceUrl
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          Write-Host "Downloading from: $SourceUrl"
          Invoke-WebRequest -Uri $SourceUrl -OutFile $OutputPath -UseBasicParsing
          Write-Host "Downloaded: $ArchiveName"

      - name: Extract source
        run: |
          $ArchiveName = Split-Path -Leaf "${{ github.event.inputs.source_url }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          if ($ArchiveName -like "*.tar.xz") {
            tar -xf $OutputPath -C $env:TEMP
          } elseif ($ArchiveName -like "*.tgz") {
            tar -xzf $OutputPath -C $env:TEMP
          }

      - name: Locate CPython source directory
        id: source
        run: |
          $PythonDirs = @(Get-ChildItem $env:TEMP -Directory -Filter "Python-*" -ErrorAction SilentlyContinue)
          if ($PythonDirs.Count -eq 0) {
            Write-Host "ERROR: No Python-* directory found"
            exit 1
          }
          
          $SourceDir = $PythonDirs[0].FullName
          Write-Host "Found source: $SourceDir"
          echo "source_dir=$SourceDir" >> $env:GITHUB_OUTPUT

      - name: Build CPython x86 (Win32)
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          Write-Host "Building x86 (Win32)..."
          cd $PcbuildDir
          
          # Run build.bat with release mode and Win32 platform
          & cmd /c "build.bat -d -p Win32"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed with exit code: $LASTEXITCODE"
            exit 1
          }
          Write-Host "Build completed successfully"

      - name: Locate x86 python.exe
        id: exe_x86
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          # Search for python.exe in common build output locations
          $SearchPaths = @(
            (Join-Path $PcbuildDir "win32\python.exe"),
            (Join-Path $PcbuildDir "win32\Release\python.exe"),
            (Join-Path $PcbuildDir "win32\Debug\python.exe"),
            (Join-Path $PcbuildDir "amd64\python.exe"),
            (Join-Path $PcbuildDir "amd64\Release\python.exe")
          )
          
          $ExePath = $null
          foreach ($path in $SearchPaths) {
            if (Test-Path $path) {
              $ExePath = $path
              Write-Host "Found: $ExePath"
              break
            }
          }
          
          if (-not $ExePath) {
            Write-Host "Searching for all python.exe files..."
            Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe" -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "Available: $($_.FullName)"
            }
            exit 1
          }
          
          echo "exe_path=$ExePath" >> $env:GITHUB_OUTPUT

      - name: Copy x86 executable
        run: |
          $ExePath = "${{ steps.exe_x86.outputs.exe_path }}"
          $Version = "${{ needs.prepare.outputs.version }}"
          $OutputName = "python-$Version.exe"
          
          Copy-Item $ExePath $OutputName -Force
          Write-Host "Created: $OutputName"
          Get-Item $OutputName | Format-List Name, Length

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v7
        with:
          name: cpython-x86
          path: python-${{ needs.prepare.outputs.version }}.exe
          retention-days: 30

  build-x64:
    runs-on: windows-2022
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          $SourceUrl = "${{ github.event.inputs.source_url }}"
          $ArchiveName = Split-Path -Leaf $SourceUrl
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          Invoke-WebRequest -Uri $SourceUrl -OutFile $OutputPath -UseBasicParsing

      - name: Extract source
        run: |
          $ArchiveName = Split-Path -Leaf "${{ github.event.inputs.source_url }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          if ($ArchiveName -like "*.tar.xz") {
            tar -xf $OutputPath -C $env:TEMP
          } elseif ($ArchiveName -like "*.tgz") {
            tar -xzf $OutputPath -C $env:TEMP
          }

      - name: Locate CPython source directory
        id: source
        run: |
          $PythonDirs = @(Get-ChildItem $env:TEMP -Directory -Filter "Python-*" -ErrorAction SilentlyContinue)
          if ($PythonDirs.Count -eq 0) { exit 1 }
          echo "source_dir=$($PythonDirs[0].FullName)" >> $env:GITHUB_OUTPUT

      - name: Build CPython x64
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          Write-Host "Building x64..."
          cd $PcbuildDir
          
          & cmd /c "build.bat -d -p x64"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed"
            exit 1
          }

      - name: Locate x64 python.exe
        id: exe_x64
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          $SearchPaths = @(
            (Join-Path $PcbuildDir "amd64\python.exe"),
            (Join-Path $PcbuildDir "amd64\Release\python.exe"),
            (Join-Path $PcbuildDir "amd64\Debug\python.exe"),
            (Join-Path $PcbuildDir "x64\python.exe")
          )
          
          $ExePath = $null
          foreach ($path in $SearchPaths) {
            if (Test-Path $path) {
              $ExePath = $path
              Write-Host "Found: $ExePath"
              break
            }
          }
          
          if (-not $ExePath) {
            Write-Host "Searching for all python.exe files..."
            Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe" | ForEach-Object {
              Write-Host "Available: $($_.FullName)"
            }
            exit 1
          }
          
          echo "exe_path=$ExePath" >> $env:GITHUB_OUTPUT

      - name: Copy x64 executable
        run: |
          $ExePath = "${{ steps.exe_x64.outputs.exe_path }}"
          $Version = "${{ needs.prepare.outputs.version }}"
          $OutputName = "python-$Version-amd64.exe"
          
          Copy-Item $ExePath $OutputName -Force
          Write-Host "Created: $OutputName"

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: cpython-x64
          path: python-${{ needs.prepare.outputs.version }}-amd64.exe
          retention-days: 30

  build-arm64:
    runs-on: windows-2022
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          $SourceUrl = "${{ github.event.inputs.source_url }}"
          $ArchiveName = Split-Path -Leaf $SourceUrl
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          Invoke-WebRequest -Uri $SourceUrl -OutFile $OutputPath -UseBasicParsing

      - name: Extract source
        run: |
          $ArchiveName = Split-Path -Leaf "${{ github.event.inputs.source_url }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          if ($ArchiveName -like "*.tar.xz") {
            tar -xf $OutputPath -C $env:TEMP
          } elseif ($ArchiveName -like "*.tgz") {
            tar -xzf $OutputPath -C $env:TEMP
          }

      - name: Locate CPython source directory
        id: source
        run: |
          $PythonDirs = @(Get-ChildItem $env:TEMP -Directory -Filter "Python-*" -ErrorAction SilentlyContinue)
          if ($PythonDirs.Count -eq 0) { exit 1 }
          echo "source_dir=$($PythonDirs[0].FullName)" >> $env:GITHUB_OUTPUT

      - name: Build CPython ARM64
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          Write-Host "Building ARM64..."
          cd $PcbuildDir
          
          & cmd /c "build.bat -d -p ARM64"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed"
            exit 1
          }

      - name: Locate ARM64 python.exe
        id: exe_arm64
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          $SearchPaths = @(
            (Join-Path $PcbuildDir "arm64\python.exe"),
            (Join-Path $PcbuildDir "arm64\Release\python.exe"),
            (Join-Path $PcbuildDir "arm64\Debug\python.exe")
          )
          
          $ExePath = $null
          foreach ($path in $SearchPaths) {
            if (Test-Path $path) {
              $ExePath = $path
              Write-Host "Found: $ExePath"
              break
            }
          }
          
          if (-not $ExePath) {
            Write-Host "Searching for all python.exe files..."
            Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe" | ForEach-Object {
              Write-Host "Available: $($_.FullName)"
            }
            exit 1
          }
          
          echo "exe_path=$ExePath" >> $env:GITHUB_OUTPUT

      - name: Copy ARM64 executable
        run: |
          $ExePath = "${{ steps.exe_arm64.outputs.exe_path }}"
          $Version = "${{ needs.prepare.outputs.version }}"
          $OutputName = "python-$Version-arm64.exe"
          
          Copy-Item $ExePath $OutputName -Force
          Write-Host "Created: $OutputName"

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: cpython-arm64
          path: python-${{ needs.prepare.outputs.version }}-arm64.exe
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-x86, build-x64, build-arm64]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release_files
          
          echo "=== All downloaded artifacts ==="
          find release_artifacts -type f -name "*.exe" -exec ls -lh {} \;
          
          echo ""
          echo "=== Copying to release_files ==="
          find release_artifacts -type f -name "*.exe" -exec cp {} release_files/ \;
          
          echo ""
          echo "=== Final Release Files ==="
          ls -lh release_files/

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cpython-${{ needs.prepare.outputs.version }}-all
          path: release_files/
          retention-days: 90

      - name: Generate summary
        if: always()
        run: |
          echo "## CPython ${{ needs.prepare.outputs.version }} Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source**: ${{ github.event.inputs.source_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Executables:" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "release_files" ] && [ -n "$(ls -A release_files/)" ]; then
            ls -1 release_files/ | sed 's/^/- /'  >> $GITHUB_STEP_SUMMARY
          else
            echo "No executables generated - check job logs" >> $GITHUB_STEP_SUMMARY
          fi
