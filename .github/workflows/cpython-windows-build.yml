name: Build CPython

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'CPython source archive URL (tar.xz or tgz format)'
        required: true
        default: 'https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz'
        type: string
      verify_signature:
        description: 'Verify GPG signature'
        required: true
        default: true
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      archive_name: ${{ steps.extract.outputs.archive_name }}
      archive_type: ${{ steps.extract.outputs.archive_type }}
    steps:
      - name: Extract version and archive info from URL
        id: extract
        run: |
          URL="${{ github.event.inputs.source_url }}"
          
          # Extract archive name from URL
          ARCHIVE_NAME=$(basename "$URL")
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          
          # Determine archive type
          if [[ "$ARCHIVE_NAME" == *.tar.xz ]]; then
            ARCHIVE_TYPE="tar.xz"
          elif [[ "$ARCHIVE_NAME" == *.tgz ]]; then
            ARCHIVE_TYPE="tgz"
          else
            echo "Error: Unsupported archive format"
            exit 1
          fi
          echo "archive_type=$ARCHIVE_TYPE" >> $GITHUB_OUTPUT
          
          # Extract version (e.g., 3.11.15 from Python-3.11.15.tar.xz)
          VERSION=$(echo "$ARCHIVE_NAME" | sed -E 's/Python-([0-9]+\.[0-9]+\.[0-9]+)\.(tar\.xz|tgz)/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "Archive: $ARCHIVE_NAME"
          echo "Type: $ARCHIVE_TYPE"
          echo "Version: $VERSION"

  download-and-verify:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          cd /tmp
          wget -q "${{ github.event.inputs.source_url }}"
          echo "Downloaded: $(ls -lh $(basename ${{ github.event.inputs.source_url }}))"

      - name: Download GPG signature and certificate
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          BASE_URL="${{ github.event.inputs.source_url }}"
          BASE_URL="${BASE_URL%/*}"
          
          # Download .asc file
          wget -q "$BASE_URL/$ARCHIVE_NAME.asc" || echo "No .asc file found"
          
          # Download .asc.sig file if available
          wget -q "$BASE_URL/$ARCHIVE_NAME.asc.sig" || true
          
          ls -lh $ARCHIVE_NAME* 2>/dev/null | head -20

      - name: Import GPG keys from keyserver
        run: |
          # Import all possible Python Release Signing Keys
          echo "Importing GPG keys..."
          
          # Key for recent releases (3.11+)
          gpg --keyserver keys.openpgp.org --recv-keys CFDCA245B1043CF2A5F97865FFE87404168BD847 2>&1 || \
          gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys CFDCA245B1043CF2A5F97865FFE87404168BD847 2>&1 || \
          echo "Trying alternate key servers..."
          
          # Fallback: Try other known Python release keys
          gpg --keyserver keys.openpgp.org --recv-keys \
            0D96DF4D4110E5C1A2A4B132C3A8495E0E31E23B \
            E8AC80D7A454B8403413E8521C4EB3FE58C6E5C6 \
            A821E680E5F81405F7BF06D3FEB907C925FFFC99 \
            6E3CBCC4F1D7B6885BEAFC36C50E9CDE82C78001 2>&1 || true
          
          echo "Available keys:"
          gpg --list-keys 2>/dev/null | grep -E "^pub|uid" || echo "No keys found"

      - name: Verify GPG signature
        if: github.event.inputs.verify_signature == 'true'
        continue-on-error: true
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          
          if [ -f "$ARCHIVE_NAME.asc" ]; then
            echo "Verifying with .asc file..."
            if gpg --verify "$ARCHIVE_NAME.asc" "$ARCHIVE_NAME" 2>&1; then
              echo "✓ Signature verification successful"
              exit 0
            else
              echo "⚠ Signature verification failed but continuing..."
              exit 0
            fi
          else
            echo "⚠ No .asc signature file found"
            exit 0
          fi

      - name: Calculate source hash
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          echo "SHA256 Checksum:"
          sha256sum "$ARCHIVE_NAME"

  build-x86:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          $SourceUrl = "${{ github.event.inputs.source_url }}"
          $ArchiveName = Split-Path -Leaf $SourceUrl
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          Write-Host "Downloading from: $SourceUrl"
          Invoke-WebRequest -Uri $SourceUrl -OutFile $OutputPath -UseBasicParsing
          Write-Host "Downloaded: $ArchiveName"
          Write-Host "Size: $((Get-Item $OutputPath).Length / 1MB) MB"

      - name: Extract source
        run: |
          $ArchiveName = Split-Path -Leaf "${{ github.event.inputs.source_url }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          $ExtractDir = $env:TEMP
          
          Write-Host "Archive: $ArchiveName"
          Write-Host "Extract location: $ExtractDir"
          
          if ($ArchiveName -like "*.tar.xz") {
            Write-Host "Extracting tar.xz archive..."
            tar -xf $OutputPath -C $ExtractDir
          } elseif ($ArchiveName -like "*.tgz") {
            Write-Host "Extracting tgz archive..."
            tar -xzf $OutputPath -C $ExtractDir
          }
          
          # List extracted directories
          Write-Host "Extracted contents:"
          Get-ChildItem $ExtractDir -Directory | Where-Object {$_.Name -like "Python-*"} | Select-Object -First 5

      - name: Locate CPython source directory
        id: source
        run: |
          $PythonDirs = @(Get-ChildItem $env:TEMP -Directory -Filter "Python-*" -ErrorAction SilentlyContinue)
          
          if ($PythonDirs.Count -eq 0) {
            Write-Host "ERROR: No Python-* directory found in $env:TEMP"
            Get-ChildItem $env:TEMP -Directory | Select-Object Name | Head -20
            exit 1
          }
          
          $SourceDir = $PythonDirs[0].FullName
          Write-Host "Found source directory: $SourceDir"
          Write-Host "source_dir=$SourceDir" >> $env:GITHUB_OUTPUT
          
          # Verify PCbuild exists
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          if (Test-Path $PcbuildDir) {
            Write-Host "✓ PCbuild directory found"
          } else {
            Write-Host "ERROR: PCbuild directory not found at $PcbuildDir"
            Get-ChildItem $SourceDir | Select-Object Name
            exit 1
          }

      - name: Setup build environment
        run: |
          Write-Host "Python version:"
          python --version
          
          Write-Host "Visual Studio information:"
          & 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat' -arch=x86
          cl.exe

      - name: Build CPython x86
        shell: cmd
        run: |
          setlocal enabledelayedexpansion
          
          cd /D "${{ steps.source.outputs.source_dir }}\PCbuild"
          
          echo Building x86 (Win32) version...
          call build.bat -d -p Win32
          
          if !ERRORLEVEL! neq 0 (
            echo ERROR: x86 build failed
            exit /b 1
          )
          
          echo Build successful

      - name: Prepare x86 executable
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          $Version = "${{ needs.prepare.outputs.version }}"
          
          # Look for python executable in various possible locations
          $PossiblePaths = @(
            (Join-Path $PcbuildDir "win32\python.exe"),
            (Join-Path $PcbuildDir "win32\Release\python.exe"),
            (Join-Path $PcbuildDir "win32\Debug\python.exe"),
            (Join-Path $PcbuildDir "python.exe")
          )
          
          $ExePath = $null
          foreach ($path in $PossiblePaths) {
            if (Test-Path $path) {
              $ExePath = $path
              Write-Host "Found executable at: $ExePath"
              break
            }
          }
          
          if (-not $ExePath) {
            Write-Host "ERROR: python.exe not found in expected locations"
            Write-Host "Searching for all python.exe files:"
            Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe" -ErrorAction SilentlyContinue
            exit 1
          }
          
          $OutputName = "python-$Version.exe"
          Copy-Item $ExePath $OutputName -Force
          Write-Host "Created: $OutputName"
          Get-Item $OutputName | Select-Object Name, Length

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpython-x86
          path: python-${{ needs.prepare.outputs.version }}.exe
          retention-days: 30

