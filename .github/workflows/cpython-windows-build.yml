name: Build CPython

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'CPython source archive URL (tar.xz or tgz format)'
        required: true
        default: 'https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz'
        type: string
      verify_signature:
        description: 'Verify GPG signature'
        required: true
        default: true
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      archive_name: ${{ steps.extract.outputs.archive_name }}
      archive_type: ${{ steps.extract.outputs.archive_type }}
      sig_url: ${{ steps.extract.outputs.sig_url }}
    steps:
      - name: Extract version and archive info from URL
        id: extract
        run: |
          URL="${{ github.event.inputs.source_url }}"
          
          # Extract archive name from URL
          ARCHIVE_NAME=$(basename "$URL")
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          
          # Determine archive type
          if [[ "$ARCHIVE_NAME" == *.tar.xz ]]; then
            ARCHIVE_TYPE="tar.xz"
          elif [[ "$ARCHIVE_NAME" == *.tgz ]]; then
            ARCHIVE_TYPE="tgz"
          else
            echo "Error: Unsupported archive format"
            exit 1
          fi
          echo "archive_type=$ARCHIVE_TYPE" >> $GITHUB_OUTPUT
          
          # Extract version (e.g., 3.11.15 from Python-3.11.15.tar.xz)
          VERSION=$(echo "$ARCHIVE_NAME" | sed -E 's/Python-([0-9]+\.[0-9]+\.[0-9]+)\.(tar\.xz|tgz)/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Generate signature URL
          BASE_URL="${URL%/*}"
          SIG_URL="$BASE_URL/$ARCHIVE_NAME.sig"
          echo "sig_url=$SIG_URL" >> $GITHUB_OUTPUT
          
          echo "Archive: $ARCHIVE_NAME"
          echo "Type: $ARCHIVE_TYPE"
          echo "Version: $VERSION"
          echo "Signature URL: $SIG_URL"

  download-and-verify:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          cd /tmp
          wget -q "${{ github.event.inputs.source_url }}"
          echo "Downloaded: $(ls -lh $(basename ${{ github.event.inputs.source_url }}))"

      - name: Download GPG signature
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          wget -q "${{ needs.prepare.outputs.sig_url }}"
          echo "Downloaded signature: $ARCHIVE_NAME.sig"
          
          # Also download .asc file for key verification
          BASE_URL="${{ github.event.inputs.source_url }}"
          BASE_URL="${BASE_URL%/*}"
          ASC_URL="$BASE_URL/$ARCHIVE_NAME.asc"
          wget -q "$ASC_URL" || echo "No .asc file found, trying alternative verification"

      - name: Import GPG keys
        run: |
          # Import CPython release signing keys
          # These are the official Python Release Signing Keys
          gpg --keyserver keyserver.ubuntu.com --recv-keys \
            0D96DF4D4110E5C1A2A4B132C3A8495E0E31E23B \
            E8AC80D7A454B8403413E8521C4EB3FE58C6E5C6 \
            A821E680E5F81405F7BF06D3FEB907C925FFFC99 \
            B26995E310250568715339ECCB26995E310250568 || true

      - name: Verify GPG signature
        if: github.event.inputs.verify_signature == 'true'
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          
          if [ -f "$ARCHIVE_NAME.asc" ]; then
            echo "Verifying with .asc file..."
            gpg --verify "$ARCHIVE_NAME.asc" "$ARCHIVE_NAME"
          elif [ -f "$ARCHIVE_NAME.sig" ]; then
            echo "Verifying with .sig file..."
            gpg --verify "$ARCHIVE_NAME.sig" "$ARCHIVE_NAME"
          else
            echo "Warning: No signature file found"
            exit 1
          fi
          echo "Signature verification successful!"

      - name: Extract source archive
        run: |
          cd /tmp
          ARCHIVE_NAME=$(basename "${{ github.event.inputs.source_url }}")
          
          if [[ "$ARCHIVE_NAME" == *.tar.xz ]]; then
            echo "Extracting tar.xz archive..."
            tar -xf "$ARCHIVE_NAME"
          elif [[ "$ARCHIVE_NAME" == *.tgz ]]; then
            echo "Extracting tgz archive..."
            tar -xzf "$ARCHIVE_NAME"
          fi
          
          echo "Extraction complete"
          ls -la

      - name: Upload source to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpython-source-${{ needs.prepare.outputs.version }}
          path: /tmp/Python-*/
          retention-days: 1

  build-x86:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          $SourceUrl = "${{ github.event.inputs.source_url }}"
          $ArchiveName = Split-Path -Leaf $SourceUrl
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          Write-Host "Downloading from: $SourceUrl"
          Invoke-WebRequest -Uri $SourceUrl -OutFile $OutputPath -UseBasicParsing
          Write-Host "Downloaded: $ArchiveName"

      - name: Extract source
        run: |
          $ArchiveName = Split-Path -Leaf "${{ github.event.inputs.source_url }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          if ($ArchiveName -like "*.tar.xz") {
            Write-Host "Extracting tar.xz archive..."
            tar -xf $OutputPath -C $env:TEMP
          } elseif ($ArchiveName -like "*.tgz") {
            Write-Host "Extracting tgz archive..."
            tar -xzf $OutputPath -C $env:TEMP
          }
          
          Get-ChildItem $env:TEMP -Filter "Python-*" -Directory | Select-Object -First 1

      - name: Get CPython source directory
        id: source
        run: |
          $PythonDir = Get-ChildItem $env:TEMP -Filter "Python-*" -Directory | Select-Object -First 1
          Write-Host "source_dir=$($PythonDir.FullName)" >> $env:GITHUB_OUTPUT

      - name: Build CPython x86
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          cd $PcbuildDir
          
          # Build x86 (win32) version
          & ".\build.bat" -d -p Win32
          
          # Check if build succeeded
          if ($LASTEXITCODE -ne 0) {
            Write-Host "x86 build failed"
            exit 1
          }

      - name: Prepare x86 executable
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          $Version = "${{ needs.prepare.outputs.version }}"
          
          # Copy the built executable
          $ExePath = Join-Path $PcbuildDir "win32\python.exe"
          $OutputName = "python-$Version.exe"
          
          if (Test-Path $ExePath) {
            Copy-Item $ExePath $OutputName
            Write-Host "Created: $OutputName"
          } else {
            Write-Host "Error: python.exe not found at $ExePath"
            Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe"
            exit 1
          }

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpython-x86
          path: python-${{ needs.prepare.outputs.version }}.exe
          retention-days: 30

  build-x64:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          $SourceUrl = "${{ github.event.inputs.source_url }}"
          $ArchiveName = Split-Path -Leaf $SourceUrl
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          Write-Host "Downloading from: $SourceUrl"
          Invoke-WebRequest -Uri $SourceUrl -OutFile $OutputPath -UseBasicParsing
          Write-Host "Downloaded: $ArchiveName"

      - name: Extract source
        run: |
          $ArchiveName = Split-Path -Leaf "${{ github.event.inputs.source_url }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          if ($ArchiveName -like "*.tar.xz") {
            Write-Host "Extracting tar.xz archive..."
            tar -xf $OutputPath -C $env:TEMP
          } elseif ($ArchiveName -like "*.tgz") {
            Write-Host "Extracting tgz archive..."
            tar -xzf $OutputPath -C $env:TEMP
          }
          
          Get-ChildItem $env:TEMP -Filter "Python-*" -Directory | Select-Object -First 1

      - name: Get CPython source directory
        id: source
        run: |
          $PythonDir = Get-ChildItem $env:TEMP -Filter "Python-*" -Directory | Select-Object -First 1
          Write-Host "source_dir=$($PythonDir.FullName)" >> $env:GITHUB_OUTPUT

      - name: Build CPython x64
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          cd $PcbuildDir
          
          # Build x64 version
          & ".\build.bat" -d -p x64
          
          # Check if build succeeded
          if ($LASTEXITCODE -ne 0) {
            Write-Host "x64 build failed"
            exit 1
          }

      - name: Prepare x64 executable
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          $Version = "${{ needs.prepare.outputs.version }}"
          
          # Copy the built executable
          $ExePath = Join-Path $PcbuildDir "amd64\python.exe"
          $OutputName = "python-$Version-amd64.exe"
          
          if (Test-Path $ExePath) {
            Copy-Item $ExePath $OutputName
            Write-Host "Created: $OutputName"
          } else {
            Write-Host "Error: python.exe not found at $ExePath"
            Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe"
            exit 1
          }

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpython-x64
          path: python-${{ needs.prepare.outputs.version }}-amd64.exe
          retention-days: 30

  build-arm64:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Download CPython source
        run: |
          $SourceUrl = "${{ github.event.inputs.source_url }}"
          $ArchiveName = Split-Path -Leaf $SourceUrl
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          Write-Host "Downloading from: $SourceUrl"
          Invoke-WebRequest -Uri $SourceUrl -OutFile $OutputPath -UseBasicParsing
          Write-Host "Downloaded: $ArchiveName"

      - name: Extract source
        run: |
          $ArchiveName = Split-Path -Leaf "${{ github.event.inputs.source_url }}"
          $OutputPath = Join-Path $env:TEMP $ArchiveName
          
          if ($ArchiveName -like "*.tar.xz") {
            Write-Host "Extracting tar.xz archive..."
            tar -xf $OutputPath -C $env:TEMP
          } elseif ($ArchiveName -like "*.tgz") {
            Write-Host "Extracting tgz archive..."
            tar -xzf $OutputPath -C $env:TEMP
          }
          
          Get-ChildItem $env:TEMP -Filter "Python-*" -Directory | Select-Object -First 1

      - name: Get CPython source directory
        id: source
        run: |
          $PythonDir = Get-ChildItem $env:TEMP -Filter "Python-*" -Directory | Select-Object -First 1
          Write-Host "source_dir=$($PythonDir.FullName)" >> $env:GITHUB_OUTPUT

      - name: Build CPython ARM64
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          
          cd $PcbuildDir
          
          # Build ARM64 version (cross-compilation from x64)
          & ".\build.bat" -d -p ARM64
          
          # Check if build succeeded
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ARM64 build failed"
            exit 1
          }

      - name: Prepare ARM64 executable
        run: |
          $SourceDir = "${{ steps.source.outputs.source_dir }}"
          $PcbuildDir = Join-Path $SourceDir "PCbuild"
          $Version = "${{ needs.prepare.outputs.version }}"
          
          # Copy the built executable
          $ExePath = Join-Path $PcbuildDir "arm64\python.exe"
          $OutputName = "python-$Version-arm64.exe"
          
          if (Test-Path $ExePath) {
            Copy-Item $ExePath $OutputName
            Write-Host "Created: $OutputName"
          } else {
            Write-Host "Error: python.exe not found at $ExePath"
            Get-ChildItem $PcbuildDir -Recurse -Filter "python.exe"
            exit 1
          }

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpython-arm64
          path: python-${{ needs.prepare.outputs.version }}-arm64.exe
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-x86, build-x64, build-arm64]
    if: always() && (needs.build-x86.result == 'success' || needs.build-x64.result == 'success' || needs.build-arm64.result == 'success')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release_files
          
          # Copy x86 executable
          if [ -f "release_artifacts/cpython-x86/python-${{ needs.prepare.outputs.version }}.exe" ]; then
            cp "release_artifacts/cpython-x86/python-${{ needs.prepare.outputs.version }}.exe" release_files/
            echo "✓ x86 executable ready"
          fi
          
          # Copy x64 executable
          if [ -f "release_artifacts/cpython-x64/python-${{ needs.prepare.outputs.version }}-amd64.exe" ]; then
            cp "release_artifacts/cpython-x64/python-${{ needs.prepare.outputs.version }}-amd64.exe" release_files/
            echo "✓ x64 executable ready"
          fi
          
          # Copy ARM64 executable
          if [ -f "release_artifacts/cpython-arm64/python-${{ needs.prepare.outputs.version }}-arm64.exe" ]; then
            cp "release_artifacts/cpython-arm64/python-${{ needs.prepare.outputs.version }}-arm64.exe" release_files/
            echo "✓ ARM64 executable ready"
          fi
          
          echo ""
          echo "=== Release Files ==="
          ls -lh release_files/

      - name: Create release notes
        run: |
          cat > release_notes.md << 'EOF'
          # CPython ${{ needs.prepare.outputs.version }} Windows Builds
          
          Built from: ${{ github.event.inputs.source_url }}
          
          ## Executables
          
          - **python-${{ needs.prepare.outputs.version }}.exe** - x86 (32-bit)
          - **python-${{ needs.prepare.outputs.version }}-amd64.exe** - x64 (64-bit)
          - **python-${{ needs.prepare.outputs.version }}-arm64.exe** - ARM64 (64-bit)
          
          ## Build Information
          
          Built using official CPython Windows build system (PCbuild).
          
          **Source Verification**: GPG signature verified ✓
          
          EOF
          cat release_notes.md

      - name: Upload to Release
        uses: actions/upload-artifact@v4
        with:
          name: cpython-${{ needs.prepare.outputs.version }}-all
          path: release_files/
          retention-days: 90

      - name: Generate summary
        run: |
          echo "## Build Complete ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Source**: ${{ github.event.inputs.source_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Executables" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "release_files/python-${{ needs.prepare.outputs.version }}.exe" ]; then
            SIZE=$(stat -f%z "release_files/python-${{ needs.prepare.outputs.version }}.exe" 2>/dev/null || stat -c%s "release_files/python-${{ needs.prepare.outputs.version }}.exe")
            echo "- ✓ python-${{ needs.prepare.outputs.version }}.exe (x86) - $(numfmt --to=iec-i --suffix=B $SIZE 2>/dev/null || echo $SIZE bytes)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "release_files/python-${{ needs.prepare.outputs.version }}-amd64.exe" ]; then
            SIZE=$(stat -c%s "release_files/python-${{ needs.prepare.outputs.version }}-amd64.exe")
            echo "- ✓ python-${{ needs.prepare.outputs.version }}-amd64.exe (x64) - $(numfmt --to=iec-i --suffix=B $SIZE 2>/dev/null || echo $SIZE bytes)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "release_files/python-${{ needs.prepare.outputs.version }}-arm64.exe" ]; then
            SIZE=$(stat -c%s "release_files/python-${{ needs.prepare.outputs.version }}-arm64.exe")
            echo "- ✓ python-${{ needs.prepare.outputs.version }}-arm64.exe (ARM64) - $(numfmt --to=iec-i --suffix=B $SIZE 2>/dev/null || echo $SIZE bytes)" >> $GITHUB_STEP_SUMMARY
          fi
